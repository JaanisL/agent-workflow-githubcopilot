name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests & Audit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    name: Build Docker Image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-pipelines-app:${{ github.sha }} .

      - name: Run smoke test on Docker
        run: |
          docker run -d -p 3000:3000 --name smoke-test devops-pipelines-app:${{ github.sha }}
          sleep 2
          curl -f http://localhost:3000/health || (docker logs smoke-test && exit 1)
          docker stop smoke-test
          docker rm smoke-test

  publish:
    needs: build
    runs-on: ubuntu-latest
    name: Publish Docker Image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and tag Docker image
        run: |
          docker build -t devops-pipelines-app:latest .
          docker tag devops-pipelines-app:latest devops-pipelines-app:${{ github.sha }}

      - name: Publish to Docker Hub
        run: |
          echo "Docker image built successfully"
          echo "Image tags: devops-pipelines-app:latest, devops-pipelines-app:${{ github.sha }}"
          echo "Note: To publish, configure Docker Hub credentials in GitHub Secrets"
